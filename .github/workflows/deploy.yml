name: MI AI v3 — Deploy & Keep Alive 24/7

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g vercel@latest
      - name: Validate files
        run: |
          echo "Checking files..."
          ls -la
          test -f index.html && echo "OK index.html" || (echo "MISSING index.html" && exit 1)
          test -f vercel.json && echo "OK vercel.json" || (echo "MISSING vercel.json" && exit 1)
      - name: Deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
      - run: echo "✅ MI AI v3 Deployed! By Muaaz Iqbal | Muslim Islam Org"

  keepalive:
    name: Keep Alive 24/7
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - run: |
          git config user.name "MI AI Bot"
          git config user.email "bot@mi-ai.com"
          echo "$(date -u)" > .keepalive
          git add .keepalive
          git diff --staged --quiet || git commit -m "keepalive $(date -u '+%Y-%m-%d %H:%M')"
          git push || true
