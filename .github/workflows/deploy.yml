name: MI AI — Deploy & Keep Alive 24/7

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 */6 * * *'

jobs:
  # ─────────────────────────────
  # JOB 1: Deploy to Vercel
  # ─────────────────────────────
  deploy:
    name: 🚀 Deploy MI AI to Vercel
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Vercel CLI
        run: npm install -g vercel@latest

      - name: ✅ Validate Project Files
        run: |
          echo "════════════════════════════════"
          echo "   MI AI — File Validation"
          echo "════════════════════════════════"
          test -f index.html       && echo "✅ index.html"        || echo "❌ index.html MISSING"
          test -f vercel.json      && echo "✅ vercel.json"       || echo "❌ vercel.json MISSING"
          test -f src/styles/main.css && echo "✅ main.css"      || echo "❌ main.css MISSING"
          test -f src/utils/groq.js   && echo "✅ groq.js"       || echo "❌ groq.js MISSING"
          test -f src/utils/firebase.js && echo "✅ firebase.js"  || echo "❌ firebase.js MISSING"
          echo "════════════════════════════════"
          echo "📁 Full file list:"
          find . -not -path './.git/*' -not -path './node_modules/*' -type f | sort
          echo "════════════════════════════════"

      - name: 🚀 Deploy to Vercel (Production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

      - name: 🎉 Deploy Success
        run: |
          echo "════════════════════════════════════════"
          echo "   ✅ MI AI Deployed Successfully!"
          echo "   👨‍💻 By Muaaz Iqbal | Muslim Islam Org"
          echo "   🕌 بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ"
          echo "════════════════════════════════════════"

  # ─────────────────────────────
  # JOB 2: Keep Alive (Scheduled)
  # ─────────────────────────────
  keepalive:
    name: ⏰ Keep MI AI Alive 24/7
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Ping & Health Check
        run: |
          echo "⏰ Keepalive ping — $(date '+%Y-%m-%d %H:%M:%S UTC')"
          echo "🟢 MI AI is running 24/7 — مَاشَاءَاللَّه"

      - name: 🔄 Auto-commit keepalive
        run: |
          git config user.name "MI AI Bot"
          git config user.email "mi-ai@muslimislam.org"
          echo "$(date '+%Y-%m-%d %H:%M:%S')" > .keepalive
          git add .keepalive
          git diff --staged --quiet || git commit -m "⏰ keepalive: $(date '+%Y-%m-%d %H:%M')"
          git push || true
